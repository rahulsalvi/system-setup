---
- name: Bootstrap host for system setup
  hosts: localhost
  tasks:
    - name: Load roles definition
      ansible.builtin.include_vars:
        file: roles.yml

    - name: Validate machine_role is defined
      ansible.builtin.assert:
        that:
          - machine_role is defined
          - machine_role | length > 0
        fail_msg: "machine_role is required. Example: -e machine_role=desktop"

    - name: Validate machine_role is known
      ansible.builtin.assert:
        that:
          - machine_role in machine_roles | map(attribute='name') | list
        fail_msg: >
          "Invalid machine_role '{{ machine_role }}'.
          Must be one of: {{ machine_roles | map(attribute='name') | join(',') }}"

    - name: Install ansible and configure /etc/ansible
      ansible.builtin.include_role:
        name: ansible

    - name: Deploy hosts file to /etc/ansible/hosts.d
      ansible.builtin.template:
        src: templates/hosts.j2
        dest: "/etc/ansible/hosts.d/{{ machine_role }}"
        owner: root
        group: root
        mode: u=rw,g=r,o=r
      become: true
