# vim: ft=yaml.ansible
---
- name: Bootstrap host for system setup
  hosts: localhost
  tasks:
    - name: Validate machine_role is defined
      ansible.builtin.assert:
        that:
          - machine_role is defined
          - machine_role | length > 0
        fail_msg: "machine_role is required. Example: -e machine_role=desktop"

    - name: Find all role directories
      ansible.builtin.find:
        paths: "{{ playbook_dir }}/roles"
        file_type: directory
        depth: 1
      register: roles_found

    - name: Build role names list
      ansible.builtin.set_fact:
        available_roles: "{{ roles_found.files | map(attribute='path') | map('basename') | list }}"

    - name: Validate machine_role is known
      ansible.builtin.assert:
        that:
          - machine_role in available_roles
        fail_msg: >
          "Invalid machine_role '{{ machine_role }}'.
          Must be one of: {{ available_roles | join(', ') }}"

    - name: Install system_setup
      ansible.builtin.include_role:
        name: system_setup

    - name: Deploy hosts file to /etc/ansible/hosts.d
      ansible.builtin.template:
        src: templates/hosts.j2
        dest: "/etc/ansible/hosts.d/{{ machine_role }}"
        owner: root
        group: root
        mode: u=rw,g=r,o=r
      become: true
